<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#1D9E75">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Dom.io">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <title>Dom.io</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{font-family:'Nunito',sans-serif;background:#f8f6f2;color:#1a1a1a}
    #app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:#fff;overflow:hidden}
    .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px 80px}
    .card{background:#fff;border:1px solid #ebebeb;border-radius:14px;padding:14px 15px;margin-bottom:8px}
    .card-sm{background:#fff;border:1px solid #ebebeb;border-radius:12px;padding:10px 13px;margin-bottom:7px}
    button{font-family:'Nunito',sans-serif;cursor:pointer;border:none;background:transparent;transition:transform .1s}
    button:active{transform:scale(.96)}
    .header{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid #ebebeb;flex-shrink:0}
    .bottom-nav{display:flex;border-top:1px solid #ebebeb;background:#fff;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 10px;font-size:9px;font-weight:700;position:relative;border:none;cursor:pointer;background:transparent;font-family:'Nunito',sans-serif}
    .av{border-radius:50%;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
    .pill{font-size:10px;padding:2px 7px;border-radius:99px;display:inline-flex;align-items:center}
    .bar-track{height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden}
    .bar-fill{height:100%;border-radius:3px;transition:width .4s}
    .toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;border-radius:24px;padding:9px 20px;font-size:13px;font-weight:700;z-index:999;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
    .toast.show{opacity:1}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-bg.show{opacity:1;pointer-events:all}
    .modal-box{background:#fff;border-radius:22px 22px 0 0;padding:20px 18px 40px;width:100%;max-width:480px;transform:translateY(100%);transition:transform .25s}
    .modal-bg.show .modal-box{transform:translateY(0)}
    .notif-dot{position:absolute;top:5px;right:12px;width:8px;height:8px;border-radius:50%;background:#EF4444;border:2px solid #fff}
    .toggle{width:46px;height:26px;border-radius:13px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
    .toggle-knob{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
    .spinner{width:28px;height:28px;border:3px solid #f0f0f0;border-top-color:#1D9E75;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="app">
  <div id="loading" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:14px">
    <div class="spinner"></div>
    <div style="font-size:13px;color:#aaa" id="load-msg">Ładowanie Dom.io…</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="modal-bg" id="modal"><div class="modal-box" id="modal-box"></div></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
// ===== CLEAR OLD SERVICE WORKERS =====
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){
    regs.forEach(function(r){r.unregister();});
  });
  caches.keys().then(function(names){
    names.forEach(function(n){caches.delete(n);});
  });
}

// ===== FIREBASE CONFIG =====
var FB_CFG={
  apiKey:"AIzaSyACkSuZ_K14NFIbYj9YDXxXDJY9wDY3hcc",
  authDomain:"domio-7ebcd.firebaseapp.com",
  databaseURL:"https://domio-7ebcd-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"domio-7ebcd",
  storageBucket:"domio-7ebcd.firebasestorage.app",
  messagingSenderId:"636583182165",
  appId:"1:636583182165:web:776f117677b880bebd39dc"
};

// ===== DATA =====
var BROS=[
  {name:'Bartek',init:'B',accent:'#EF9F27',light:'#FAEEDA',dark:'#8C5A0E'},
  {name:'Kuba',init:'K',accent:'#1D9E75',light:'#E1F5EE',dark:'#0A5E41'},
  {name:'Mikołaj',init:'M',accent:'#378ADD',light:'#E6F1FB',dark:'#0E4A87'}
];
var TASKS=[
  {id:'zmywanie',name:'Zmywanie naczyń',icon:'🍽️',assign:'rot3',rot3i:0,note:'Codziennie po kolacji'},
  {id:'odkurzanie',name:'Odkurzanie',icon:'🧹',assign:'rot3',rot3i:1,note:'Raz w tygodniu'},
  {id:'smieci',name:'Wynoszenie śmieci',icon:'🗑️',assign:'rot3',rot3i:2,note:'Wtorek i piątek'},
  {id:'laz-wspolna',name:'Łazienka wspólna',icon:'🚿',assign:'rot2km',rot3i:-1,note:'Kuba / Mikołaj na zmianę'},
  {id:'laz-bartek',name:'Łazienka Bartka',icon:'🛁',assign:'bartek',rot3i:-1,note:'Tylko Bartek'},
  {id:'salon',name:'Sprzątanie salonu',icon:'🛋️',assign:'rot3',rot3i:3,note:'Raz w tygodniu'},
  {id:'pranie',name:'Pranie',icon:'👕',assign:'rot3',rot3i:4,note:'Raz w tygodniu'},
  {id:'wieszanie',name:'Wieszanie prania',icon:'🪣',assign:'rot3',rot3i:5,note:'Po każdym praniu'},
  {id:'kuchenka',name:'Mycie kuchenki',icon:'🍳',assign:'rot3',rot3i:6,note:'Raz w tygodniu'},
  {id:'generalne',name:'Generalne sprzątanie',icon:'✨',assign:'all',rot3i:-1,note:'Co 2 tyg. — podłogi + okna'}
];

// ===== STATE =====
var db=null,user=null,page='dashboard';
var comps=[],swaps={},online=false;
var connAt=new Date().toISOString();

function getWeek(){var d=new Date(),s=new Date(d.getFullYear(),0,1);return Math.ceil(((d-s)/864e5+s.getDay()+1)/7)}
var WK=getWeek(),WKEY=new Date().getFullYear()+'-W'+WK;

function getBro(n){return BROS.find(function(b){return b.name===n})||BROS[0]}
function getAssigned(task){
  var sw=swaps[task.id];
  if(sw&&sw.status==='accepted')return[sw.to];
  if(task.assign==='rot3')return[BROS[(task.rot3i+WK)%3].name];
  if(task.assign==='rot2km')return[WK%2===0?'Kuba':'Mikołaj'];
  if(task.assign==='all')return BROS.map(function(b){return b.name});
  if(task.assign==='bartek')return['Bartek'];
  return['Bartek'];
}
function isDone(id,who){var w=who||user;return comps.some(function(c){return c.id===id&&c.wk===WKEY&&c.who===w})}
function getComp(id,who){var w=who||user;return comps.find(function(c){return c.id===id&&c.wk===WKEY&&c.who===w})}
function mScore(name){var s=new Date();s.setDate(1);s.setHours(0,0,0,0);return comps.filter(function(c){return c.who===name&&new Date(c.when)>=s}).length}
function myTasks(){return TASKS.filter(function(t){return getAssigned(t).indexOf(user)>=0})}
function fmt(iso){var d=new Date(iso);return d.toLocaleDateString('pl-PL',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'})}
function fmtRel(iso){var diff=Date.now()-new Date(iso);if(diff<6e4)return'przed chwilą';if(diff<36e5)return Math.floor(diff/6e4)+' min temu';if(diff<864e5)return Math.floor(diff/36e5)+' godz. temu';return fmt(iso)}

// ===== DOM HELPERS =====
function el(tag,props){
  var e=document.createElement(tag);
  if(props){
    if(props.style&&typeof props.style==='object'){Object.keys(props.style).forEach(function(k){e.style[k]=props.style[k]})}
    if(props.class)e.className=props.class;
    if(props.onClick)e.addEventListener('click',props.onClick);
    if(props.onChange)e.addEventListener('change',props.onChange);
    if(props.type)e.type=props.type;
    if(props.value!==undefined)e.value=props.value;
  }
  for(var i=2;i<arguments.length;i++){
    var c=arguments[i];
    if(c==null||c===false)continue;
    if(typeof c==='string'||typeof c==='number')e.appendChild(document.createTextNode(c));
    else if(c.nodeType)e.appendChild(c);
  }
  return e;
}
function av(name,size){
  size=size||36;var b=getBro(name);
  return el('div',{class:'av',style:{width:size+'px',height:size+'px',background:b.light,color:b.dark,fontSize:Math.round(size*.42)+'px',border:'2px solid '+b.accent}},b.init);
}
var toastT;
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show')},2400)}
function showModal(content){var b=document.getElementById('modal-box');b.innerHTML='';b.appendChild(content);document.getElementById('modal').classList.add('show')}
function hideModal(){document.getElementById('modal').classList.remove('show')}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)hideModal()});

// ===== FIREBASE BOOT =====
function boot(){
  try{
    firebase.initializeApp(FB_CFG);
    db=firebase.database();
  }catch(e){
    document.getElementById('load-msg').textContent='Błąd Firebase: '+e.message;
    return;
  }

  // Timeout: if not connected after 8s, show login anyway
  var bootTimer=setTimeout(function(){
    document.getElementById('load-msg').textContent='Łączenie trwa dłużej niż zwykle…';
    showLogin(); // show login even without data
  },8000);

  var gotData=false;
  db.ref('.info/connected').on('value',function(s){
    online=!!s.val();
    if(user)renderHeader();
  });

  db.ref('domio/completions').on('value',function(snap){
    var raw=snap.val()||{};
    comps=Object.keys(raw).map(function(k){var v=raw[k];v._key=k;return v});
    if(!gotData){gotData=true;clearTimeout(bootTimer);showLogin()}
    if(user)render();
  });

  db.ref('domio/swaps/'+WKEY).on('value',function(snap){
    swaps=snap.val()||{};
    if(user)render();
  });

  // Notifications for new completions by others
  db.ref('domio/completions').on('child_added',function(snap){
    var c=snap.val();if(!c||c.when<=connAt||!user)return;
    if(c.who!==user&&Notification.permission==='granted'){
      var task=TASKS.find(function(t){return t.id===c.id});
      new Notification('Dom.io 🏠',{body:c.who+': '+(task?task.name:c.id)+' ✓',tag:snap.key});
    }
  });

  // Notifications for swap proposals
  db.ref('domio/swaps/'+WKEY).on('child_added',function(snap){
    var sw=snap.val();if(!sw||sw.when<=connAt||!user)return;
    if(sw.to===user&&sw.status==='pending'&&Notification.permission==='granted'){
      var task=TASKS.find(function(t){return t.id===snap.key});
      new Notification('Dom.io 🔄',{body:sw.from+' proponuje zamianę: '+(task?task.name:snap.key)});
    }
  });
}

// ===== ACTIONS =====
function markDone(id){
  if(!user||isDone(id)||!db)return;
  var task=TASKS.find(function(t){return t.id===id});
  db.ref('domio/completions').push({id:id,who:user,when:new Date().toISOString(),wk:WKEY});
  showToast('✓ '+task.name);
}
function proposeSwap(taskId,target){
  if(!db)return;
  db.ref('domio/swaps/'+WKEY+'/'+taskId).set({from:user,to:target,status:'pending',when:new Date().toISOString()});
  hideModal();showToast('🔄 Propozycja wysłana do '+target+'!');
}
function respondSwap(taskId,accept){
  if(!db)return;
  if(accept){db.ref('domio/swaps/'+WKEY+'/'+taskId+'/status').set('accepted');showToast('✅ Zamiana zaakceptowana!')}
  else{db.ref('domio/swaps/'+WKEY+'/'+taskId).remove();showToast('❌ Odrzucono.')}
}
function cancelSwap(taskId){if(!db)return;db.ref('domio/swaps/'+WKEY+'/'+taskId).remove();showToast('Cofnięto.')}
function enableNotif(){
  if(!('Notification' in window)){showToast('Brak obsługi powiadomień');return}
  Notification.requestPermission().then(function(p){
    if(p==='granted'){showToast('🔔 Powiadomienia włączone!');render()}
    else showToast('Odmówiono dostępu.');
  });
}
function openSwapModal(taskId){
  var task=TASKS.find(function(t){return t.id===taskId});
  var others=BROS.filter(function(b){return b.name!==user});
  var box=el('div',{},
    el('div',{style:{fontWeight:'800',fontSize:'17px',marginBottom:'6px'}},'🔄 Zaproponuj zamianę'),
    el('div',{style:{fontSize:'13px',color:'#888',marginBottom:'18px'}},'Chcesz oddać: '+task.icon+' '+task.name)
  );
  others.forEach(function(b){
    box.appendChild(el('button',{style:{width:'100%',marginBottom:'10px',padding:'14px',background:b.light,color:b.dark,border:'2px solid '+b.accent,borderRadius:'12px',fontSize:'15px',fontWeight:'800',display:'flex',alignItems:'center',gap:'12px'},onClick:function(){proposeSwap(taskId,b.name)}},av(b.name,36),el('span',{},'Zamień z '+b.name)));
  });
  box.appendChild(el('button',{style:{width:'100%',padding:'12px',border:'1px solid #ebebeb',borderRadius:'12px',fontSize:'14px',color:'#888'},onClick:hideModal},'Anuluj'));
  showModal(box);
}

// ===== RENDER =====
function showLogin(){
  var app=document.getElementById('app');
  app.innerHTML='';
  var wrap=el('div',{style:{overflowY:'auto',padding:'32px 16px 24px',height:'100vh'}});
  wrap.appendChild(el('div',{style:{textAlign:'center',marginBottom:'28px'}},
    el('div',{style:{fontSize:'30px',fontWeight:'800'}},'Dom.io 🏠'),
    el('div',{style:{fontSize:'13px',color:'#888',marginTop:'5px'}},'Kto to?'),
    !online?el('div',{style:{fontSize:'11px',color:'#F59E0B',marginTop:'8px'}},'⚠️ Łączenie z bazą danych…'):null
  ));
  BROS.forEach(function(b){
    var bt=TASKS.filter(function(t){return getAssigned(t).indexOf(b.name)>=0});
    var score=mScore(b.name);
    wrap.appendChild(el('div',{class:'card',style:{cursor:'pointer',display:'flex',alignItems:'center',gap:'14px',borderLeft:'4px solid '+b.accent},onClick:function(){user=b.name;page='dashboard';showMain()}},
      av(b.name,52),
      el('div',{style:{flex:'1'}},
        el('div',{style:{fontWeight:'800',fontSize:'18px'}},b.name),
        el('div',{style:{fontSize:'12px',color:'#888',marginTop:'3px'}},bt.length+' zadań w tym tygodniu')
      ),
      el('div',{style:{textAlign:'right'}},
        el('div',{style:{fontSize:'22px',fontWeight:'800',color:b.accent}},String(score)),
        el('div',{style:{fontSize:'10px',color:'#bbb'}},'ten miesiąc')
      )
    ));
  });
  wrap.appendChild(el('div',{style:{textAlign:'center',marginTop:'16px',fontSize:'11px',color:'#ccc'}},'Tydzień '+WK));
  app.appendChild(wrap);
}

function showMain(){
  var app=document.getElementById('app');
  app.innerHTML='';
  app.appendChild(el('div',{class:'header',style:{id:'hdr'}}));
  app.appendChild(el('div',{class:'scroll',style:{id:'content'}}));
  app.appendChild(el('div',{class:'bottom-nav',style:{id:'nav'}}));
  // Store refs
  app._hdr=app.children[0];app._content=app.children[1];app._nav=app.children[2];
  render();
}

function render(){
  if(!user)return;
  var app=document.getElementById('app');
  renderHeader(app._hdr);
  renderNav(app._nav);
  if(page==='dashboard')renderDashboard(app._content);
  else if(page==='mine')renderMine(app._content);
  else if(page==='scores')renderScores(app._content);
  else if(page==='settings')renderSettings(app._content);
}

function renderHeader(h){
  h.innerHTML='';var ub=getBro(user),mt=myTasks(),done=mt.filter(function(t){return isDone(t.id)}).length;
  h.appendChild(el('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},
    av(user,32),
    el('div',{},
      el('div',{style:{fontWeight:'800',fontSize:'14px'}},user,
        el('span',{style:{fontSize:'9px',fontWeight:'600',padding:'1px 6px',borderRadius:'99px',marginLeft:'6px',background:online?'#E1F5EE':'#FFFBEB',color:online?'#1D9E75':'#F59E0B'}},online?'🔥 LIVE':'⚠️ offline')
      ),
      el('div',{style:{fontSize:'10px',color:'#aaa'}},page==='mine'?done+'/'+mt.length+' zrobionych':'Tydzień '+WK)
    )
  ));
  h.appendChild(el('div',{style:{display:'flex',gap:'5px'}},
    el('button',{style:{padding:'6px 9px',border:'1px solid '+(Notification.permission==='granted'?ub.accent:'#ddd'),borderRadius:'10px',background:Notification.permission==='granted'?ub.light:'transparent',fontSize:'16px'},onClick:Notification.permission!=='granted'?enableNotif:null},Notification.permission==='granted'?'🔔':'🔕'),
    el('button',{style:{padding:'6px 11px',border:'1px solid #ddd',borderRadius:'10px',fontSize:'12px',fontWeight:'700',color:'#888'},onClick:function(){user=null;showLogin()}},'Zmień')
  ));
}

function renderNav(n){
  n.innerHTML='';var ub=getBro(user);
  var pending=Object.keys(swaps).filter(function(k){return swaps[k].to===user&&swaps[k].status==='pending'}).length;
  [{id:'dashboard',l:'Przegląd',i:'🏠'},{id:'mine',l:'Moje',i:'✅',b:pending},{id:'scores',l:'Wyniki',i:'🏆'},{id:'settings',l:'Ustaw.',i:'⚙️'}].forEach(function(item){
    var active=page===item.id;
    var btn=el('button',{class:'nav-btn',style:{color:active?ub.accent:'#ccc',borderTop:active?'3px solid '+ub.accent:'3px solid transparent'},onClick:function(){page=item.id;render()}},
      el('span',{style:{fontSize:'21px'}},item.i),item.l
    );
    if(item.b>0)btn.appendChild(el('div',{class:'notif-dot'}));
    n.appendChild(btn);
  });
}

function renderDashboard(w){
  w.innerHTML='';
  // Progress
  var grid=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'7px',marginBottom:'12px'}});
  BROS.forEach(function(b){
    var bt=TASKS.filter(function(t){return getAssigned(t).indexOf(b.name)>=0});
    var bd=bt.filter(function(t){return isDone(t.id,b.name)}).length;
    var pct=bt.length?Math.round(bd/bt.length*100):0;
    grid.appendChild(el('div',{style:{background:'#fff',border:'1px solid #ebebeb',borderTop:'4px solid '+b.accent,borderRadius:'14px',padding:'10px 8px',textAlign:'center'}},
      el('div',{style:{display:'flex',justifyContent:'center',marginBottom:'4px'}},av(b.name,26)),
      el('div',{style:{fontWeight:'700',fontSize:'12px'}},b.name),
      el('div',{style:{fontSize:'11px',fontWeight:'700',color:bd===bt.length&&bt.length?'#0A5E41':'#bbb'}},bd+'/'+bt.length),
      el('div',{class:'bar-track',style:{marginTop:'4px'}},el('div',{class:'bar-fill',style:{width:pct+'%',background:b.accent}}))
    ));
  });
  w.appendChild(grid);

  TASKS.forEach(function(task){
    var resp=getAssigned(task),isAll=task.assign==='all';
    var doneWho=BROS.filter(function(b){return isDone(task.id,b.name)});
    var allDone=isAll?doneWho.length===BROS.length:doneWho.length>0;
    var sc=!isAll&&doneWho[0]?getComp(task.id,doneWho[0].name):null;
    var sw=swaps[task.id];
    var lC=allDone?'#1D9E75':resp.length===1?getBro(resp[0]).accent:'#e0e0e0';

    var sub=el('div',{style:{display:'flex',alignItems:'center',gap:'5px',flexWrap:'wrap'}});
    if(isAll){
      BROS.forEach(function(b){
        var bd=isDone(task.id,b.name);
        sub.appendChild(el('span',{class:'pill',style:{background:bd?b.light:'#f5f5f5',color:bd?b.dark:'#ccc',border:'1px solid '+(bd?b.accent:'#ebebeb')}},(bd?'✓ ':'')+b.name));
      });
    }else{
      resp.forEach(function(n){sub.appendChild(av(n,16));sub.appendChild(el('span',{style:{fontSize:'11px',color:'#888',marginRight:'4px'}},n))});
      if(sc)sub.appendChild(el('span',{style:{fontSize:'10px',color:'#0A5E41'}},'· '+fmtRel(sc.when)));
    }

    var nm=el('div',{style:{fontWeight:'700',fontSize:'13px',marginBottom:'3px',color:allDone?'#bbb':'#1a1a1a',textDecoration:allDone?'line-through':'none'}},task.name);
    if(sw&&sw.status==='pending')nm.appendChild(el('span',{style:{fontSize:'10px',marginLeft:'6px',color:'#F59E0B',fontWeight:'700'}},' ⏳ zamiana…'));
    if(sw&&sw.status==='accepted')nm.appendChild(el('span',{style:{fontSize:'10px',marginLeft:'6px',color:'#1D9E75',fontWeight:'700'}},' 🔄'));

    w.appendChild(el('div',{class:'card',style:{display:'flex',alignItems:'center',gap:'10px',borderLeft:'4px solid '+lC,opacity:allDone?'0.45':'1'}},
      el('div',{style:{width:'38px',height:'38px',borderRadius:'11px',flexShrink:'0',background:allDone?'#E1F5EE':'#f5f5f5',display:'flex',alignItems:'center',justifyContent:'center',fontSize:allDone?'16px':'20px'}},allDone?'✓':task.icon),
      el('div',{style:{flex:'1',minWidth:'0'}},nm,sub)
    ));
  });
}

function renderMine(w){
  w.innerHTML='';var ub=getBro(user);
  var pendingForMe=Object.keys(swaps).filter(function(k){return swaps[k].to===user&&swaps[k].status==='pending'});
  var myOut=Object.keys(swaps).filter(function(k){return swaps[k].from===user&&swaps[k].status==='pending'});

  if(pendingForMe.length){
    var box=el('div',{style:{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:'14px',padding:'12px 14px',marginBottom:'12px'}});
    box.appendChild(el('div',{style:{fontWeight:'800',fontSize:'13px',color:'#92400E',marginBottom:'8px'}},'🔄 Propozycje zamiany ('+pendingForMe.length+')'));
    pendingForMe.forEach(function(taskId){
      var sw=swaps[taskId],task=TASKS.find(function(t){return t.id===taskId});
      box.appendChild(el('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'8px 0',borderTop:'1px solid #FDE68A'}},
        el('div',{style:{flex:'1'}},
          el('div',{style:{fontWeight:'700',fontSize:'13px'}},sw.from+' → '+(task?task.icon+' '+task.name:taskId)),
          el('div',{style:{fontSize:'11px',color:'#A16207'}},'Przejmiesz to zadanie')
        ),
        el('button',{style:{padding:'7px 11px',background:'#1D9E75',color:'#fff',borderRadius:'9px',fontSize:'12px',fontWeight:'800'},onClick:function(){respondSwap(taskId,true)}},'✓ OK'),
        el('button',{style:{padding:'7px 11px',background:'#FEE2E2',color:'#DC2626',border:'1px solid #FCA5A5',borderRadius:'9px',fontSize:'12px',fontWeight:'800'},onClick:function(){respondSwap(taskId,false)}},'✗ Nie')
      ));
    });
    w.appendChild(box);
  }

  if(myOut.length){
    var box2=el('div',{style:{background:'#F0F9FF',border:'1px solid #BAE6FD',borderRadius:'14px',padding:'12px 14px',marginBottom:'12px'}});
    box2.appendChild(el('div',{style:{fontWeight:'800',fontSize:'13px',color:'#0369A1',marginBottom:'8px'}},'⏳ Oczekujące zamiany'));
    myOut.forEach(function(taskId){
      var sw=swaps[taskId],task=TASKS.find(function(t){return t.id===taskId});
      box2.appendChild(el('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'8px 0',borderTop:'1px solid #BAE6FD'}},
        el('div',{style:{flex:'1',fontSize:'13px'}},(task?task.icon+' '+task.name:taskId)+' → '+sw.to),
        el('button',{style:{padding:'6px 10px',border:'1px solid #BAE6FD',borderRadius:'9px',fontSize:'11px',fontWeight:'700',color:'#0369A1'},onClick:function(){cancelSwap(taskId)}},'Cofnij')
      ));
    });
    w.appendChild(box2);
  }

  var mt=myTasks();
  if(!mt.length&&!pendingForMe.length){
    w.appendChild(el('div',{class:'card',style:{textAlign:'center',padding:'40px 16px'}},
      el('div',{style:{fontSize:'40px',marginBottom:'14px'}},'🎉'),
      el('div',{style:{fontWeight:'800',fontSize:'16px'}},'Ten tydzień masz wolny!')
    ));return;
  }

  mt.forEach(function(task){
    var d=isDone(task.id),c=d?getComp(task.id):null;
    var sw=swaps[task.id],hasOut=sw&&sw.from===user&&sw.status==='pending';
    var canSwap=!d&&task.assign!=='all'&&task.assign!=='bartek';
    var btns=el('div',{style:{display:'flex',flexDirection:'column',gap:'5px',flexShrink:'0'}});
    if(!d){
      btns.appendChild(el('button',{style:{background:ub.accent,color:'#fff',borderRadius:'10px',padding:'8px 12px',fontSize:'13px',fontWeight:'800'},onClick:function(){markDone(task.id)}},'✓ Gotowe'));
      if(canSwap&&!hasOut)btns.appendChild(el('button',{style:{color:ub.dark,border:'1px solid '+ub.accent,borderRadius:'10px',padding:'5px 12px',fontSize:'11px',fontWeight:'700'},onClick:function(){openSwapModal(task.id)}},'🔄 Zamień'));
      if(hasOut)btns.appendChild(el('span',{style:{fontSize:'10px',color:'#F59E0B',fontWeight:'700',textAlign:'center'}},'⏳ czeka…'));
    }
    w.appendChild(el('div',{class:'card',style:{display:'flex',alignItems:'center',gap:'12px',borderLeft:'4px solid '+(d?'#1D9E75':ub.accent),opacity:d?'0.5':'1'}},
      el('div',{style:{width:'44px',height:'44px',borderRadius:'12px',flexShrink:'0',background:d?'#E1F5EE':ub.light,display:'flex',alignItems:'center',justifyContent:'center',fontSize:d?'18px':'22px',color:d?'#0A5E41':ub.dark}},d?'✓':task.icon),
      el('div',{style:{flex:'1',minWidth:'0'}},
        el('div',{style:{fontWeight:'700',fontSize:'15px',marginBottom:'2px',color:d?'#aaa':'#1a1a1a',textDecoration:d?'line-through':'none'}},task.name),
        el('div',{style:{fontSize:'11px',color:'#aaa'}},c?'Zrobione '+fmtRel(c.when):task.note)
      ),
      btns
    ));
  });
}

function renderScores(w){
  w.innerHTML='';
  var sorted=BROS.slice().sort(function(a,b){return mScore(b.name)-mScore(a.name)});
  var maxS=Math.max.apply(null,BROS.map(function(b){return mScore(b.name)}).concat([1]));
  var recent=comps.slice().sort(function(a,b){return new Date(b.when)-new Date(a.when)}).slice(0,25);
  var medals=['🥇','🥈','🥉'];
  w.appendChild(el('div',{style:{fontSize:'12px',color:'#bbb',marginBottom:'10px',textTransform:'capitalize'}},'Wyniki · '+new Date().toLocaleDateString('pl-PL',{month:'long',year:'numeric'})));
  var rk=el('div',{class:'card',style:{marginBottom:'14px'}});
  sorted.forEach(function(b,i){
    rk.appendChild(el('div',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'11px 0',borderBottom:i<2?'1px solid #f5f5f5':'none'}},
      el('span',{style:{fontSize:'20px',width:'26px',textAlign:'center'}},medals[i]),
      av(b.name,34),
      el('div',{style:{flex:'1'}},
        el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:'5px'}},
          el('span',{style:{fontWeight:'700',fontSize:'14px'}},b.name),
          el('span',{style:{fontSize:'16px',fontWeight:'800',color:b.accent}},String(mScore(b.name)))
        ),
        el('div',{class:'bar-track'},el('div',{class:'bar-fill',style:{width:Math.round(mScore(b.name)/maxS*100)+'%',background:b.accent}}))
      )
    ));
  });
  w.appendChild(rk);
  w.appendChild(el('div',{style:{fontSize:'12px',color:'#bbb',marginBottom:'8px'}},'Ostatnia aktywność'));
  if(!recent.length){w.appendChild(el('div',{class:'card',style:{textAlign:'center',color:'#ccc',fontSize:'13px',padding:'24px'}},'Brak aktywności 🧹'));return}
  recent.forEach(function(c){
    var task=TASKS.find(function(t){return t.id===c.id});
    w.appendChild(el('div',{class:'card-sm',style:{display:'flex',alignItems:'center',gap:'10px'}},
      av(c.who,28),
      el('div',{style:{flex:'1'}},
        el('span',{style:{fontWeight:'700',fontSize:'13px'}},c.who),
        el('span',{style:{fontSize:'13px',color:'#555'}},' — '+(task?task.name:c.id)),
        el('div',{style:{fontSize:'11px',color:'#bbb',marginTop:'1px'}},fmtRel(c.when))
      ),
      el('span',{style:{fontSize:'18px'}},task?task.icon:'📋')
    ));
  });
}

function renderSettings(w){
  w.innerHTML='';var ub=getBro(user),nok=Notification.permission==='granted';
  // Notifications
  var nc=el('div',{class:'card',style:{marginBottom:'10px'}});
  nc.appendChild(el('div',{style:{fontWeight:'800',fontSize:'15px',marginBottom:'14px'}},'🔔 Powiadomienia'));
  nc.appendChild(el('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between'}},
    el('div',{},
      el('div',{style:{fontWeight:'700',fontSize:'14px'}},'Alerty o zadaniach braci'),
      el('div',{style:{fontSize:'12px',color:'#aaa',marginTop:'2px'}},nok?'✓ Aktywne':'Wyłączone')
    ),
    el('button',{style:{padding:'8px 14px',border:'1px solid '+(nok?ub.accent:'#ddd'),borderRadius:'10px',background:nok?ub.light:'transparent',fontSize:'13px',fontWeight:'700',color:nok?ub.dark:'#555'},onClick:nok?null:enableNotif},nok?'✓ Włączone':'Włącz')
  ));
  w.appendChild(nc);
  // Task overview
  var tc=el('div',{class:'card'});
  tc.appendChild(el('div',{style:{fontWeight:'800',fontSize:'15px',marginBottom:'10px'}},'📊 Podział zadań (tydzień '+WK+')'));
  BROS.forEach(function(b){
    var bt=TASKS.filter(function(t){return getAssigned(t).indexOf(b.name)>=0});
    tc.appendChild(el('div',{style:{marginBottom:'10px'}},
      el('div',{style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'4px'}},
        av(b.name,20),
        el('span',{style:{fontWeight:'700',fontSize:'13px'}},b.name),
        el('span',{style:{fontSize:'11px',color:'#aaa',marginLeft:'auto'}},bt.length+' zadań')
      ),
      el('div',{style:{fontSize:'11px',color:'#888',paddingLeft:'26px'}},bt.map(function(t){return t.icon+' '+t.name}).join(' · ')||'Brak')
    ));
  });
  w.appendChild(tc);
}

// ===== START =====
boot();
</script>
